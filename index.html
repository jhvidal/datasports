// Lista de todos los equipos para sugerencias
const TODOS_EQUIPOS = [...new Set(PARTIDOS.flatMap(p => [p.local, p.visita]))].sort();

function mostrarSugerencias(q) {
  const div = document.getElementById('sugerencias');
  if (!q || q.length < 2) { div.classList.remove('visible'); return; }
  const qn = normalize(q);
  const matches = TODOS_EQUIPOS.filter(e => normalize(e).includes(qn)).slice(0, 6);
  if (!matches.length) { div.classList.remove('visible'); return; }
  div.innerHTML = matches.map(e =>
    `<div class="sug-item" onclick="elegirSugerencia('${e}')">
      ${flag(e)} <span>${e}</span>
    </div>`
  ).join('');
  div.classList.add('visible');
}

function elegirSugerencia(nombre) {
  busqueda = nombre;
  document.getElementById('searchInput').value = nombre;
  document.getElementById('searchClear').classList.add('visible');
  document.getElementById('sugerencias').classList.remove('visible');
  fechaActiva = null;
  diasAbiertos = {};
  buildFechaChips();
  render();
}

document.getElementById('searchInput').addEventListener('input', e => {
  busqueda = e.target.value.trim();
  fechaActiva = null; diasAbiertos={};
  document.getElementById('searchClear').classList.toggle('visible', busqueda.length>0);
  buildFechaChips();
  mostrarSugerencias(busqueda);
  render();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('sugerencias').classList.remove('visible');
  }
});

function render() {
  const filtrados = filtrar();
  const grupos    = agrupar(filtrados);
  const hoy       = fechaHoyARG();
  const cal       = document.getElementById('calendario');
  if (!grupos.length) {
    cal.innerHTML = busqueda
      ? `<div class="no-result"><div class="nr-icon">🔍</div><p>No se encontró "<strong>${busqueda}</strong>"</p><small>Probá otro nombre</small></div>`
      : `<div class="no-result"><div class="nr-icon">📅</div><p>No hay partidos en esta selección</p></div>`;
    return;
  }
  if (grupos.length===1) diasAbiertos[grupos[0][0]]=true;

  cal.innerHTML = grupos.map(([fecha, info]) => {
    const esHoy   = fecha===hoy;
    const abierto = diasAbiertos[fecha]!==false;
    // detectar si algún partido de ese día está en vivo
    const tieneLive = info.partidos.some(p => RESULTADOS[p.id]?.estado === 'live');
    const rows    = info.partidos.map(p => {
      const match = busqueda ? normalize(p.local+p.visita).includes(normalize(busqueda)) : false;
      return `<div class="partido ${match?'partido-highlight':''}" onclick="abrirPartido('${p.id}')">
        <div style="width:50px;flex-shrink:0">${horaOFin(p)}</div>
        <div class="partido-info">
          <div class="equipos">
            <span class="equipo-nombre local">
              <span class="eq-flag">${flag(p.local)}</span>
              <span class="eq-text">${nombreCorto(p.local)}</span>
            </span>
            ${resultadoBadge(p) || `<span class="vs-wrap">vs</span>`}
            <span class="equipo-nombre visita">
              <span class="eq-flag">${flag(p.visita)}</span>
              <span class="eq-text">${nombreCorto(p.visita)}</span>
            </span>
          </div>
          <div class="meta">
            ${p.grupo ? `<span class="tag tag-grupo">Grupo ${p.grupo}</span>` : `<span class="tag tag-fase">${p.fase}</span>`}
            <span class="tag tag-sede">${p.sede}</span>
            ${p.esMadrugada ? `<span class="tag tag-madrugada">⭐ madrugada</span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="dia-block">
      <div class="dia-header ${abierto?'':'closed'} ${tieneLive?'tiene-live':''}" onclick="toggleDia('${fecha}')">
        <div class="dia-fecha">${info.dia}</div>
        ${esHoy?'<span class="today-badge">HOY</span>':''}
        <span class="dia-count">${info.partidos.length}p</span>
        <span class="chevron">▾</span>
      </div>
      ${abierto?`<div class="partidos-list">${rows}</div>`:''}
    </div>`;
  }).join('');
}

function renderPosiciones() {
  const tabla = calcularPosiciones();
  const div   = document.getElementById('posiciones');
  const q     = normalize(gruposBusqVal);

  // Filtrar grupos
  let entradas = Object.entries(tabla);
  if (grupoActivo) {
    entradas = entradas.filter(([g]) => g === grupoActivo);
  } else if (q) {
    entradas = entradas.filter(([g, equipos]) =>
      equipos.some(eq => normalize(eq.nombre).includes(q))
    );
  }

  if (!entradas.length) {
    div.innerHTML = `<div class="no-result"><div class="nr-icon">🔍</div><p>No se encontró "${gruposBusqVal}"</p></div>`;
    return;
  }

  div.innerHTML = entradas.map(([g, equipos]) => {
    const abierto = gruposAbiertos[g] !== false;
    // Si busca país, highlight
    const filas = equipos.map((eq, i) => {
      const pos  = i+1;
      const bf   = FLAG_EMOJI[eq.nombre] || '🏳';
      const hl   = q && normalize(eq.nombre).includes(q);
      const dg   = eq.DG>0 ? `<span class="dg-pos">+${eq.DG}</span>`
                 : eq.DG<0 ? `<span class="dg-neg">${eq.DG}</span>`
                 : `<span>0</span>`;
      return `<tr class="pos-${pos}" style="${hl?'background:rgba(60,172,59,.14)':''}">
        <td><div class="equipo-td">
          <span class="pos-num">${pos}</span>
          <span style="font-size:1.1rem">${bf}</span>
          <span class="eq-nombre">${eq.nombre}</span>
        </div></td>
        <td class="pts-td">${eq.PTS}</td>
        <td>${eq.PJ}</td><td>${eq.PG}</td><td>${eq.PE}</td><td>${eq.PP}</td>
        <td>${dg}</td>
      </tr>`;
    }).join('');

    const mini = equipos.slice(0,2).map(e=>e.nombre.split(' ')[0]).join(', ');
    return `<div class="grupo-card">
      <div class="grupo-header ${abierto?'':'closed'}" onclick="toggleGrupo('${g}')">
        <div>
          <div class="grupo-titulo">GRUPO ${g}</div>
          <div class="grupo-equipos-mini">${mini}…</div>
        </div>
        <span class="grupo-chevron">▾</span>
      </div>
      ${abierto ? `<div class="tabla-wrap">
        <table>
          <thead><tr>
            <th style="text-align:left">Equipo</th>
            <th>PTS</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>DG</th>
          </tr></thead>
          <tbody>${filas}</tbody>
        </table>
        <div class="leyenda-tabla">
          <span><span class="leyenda-dot" style="background:var(--verde)"></span>Clasifica 32avos</span>
          <span><span class="leyenda-dot" style="background:var(--azul)"></span>3° mejor</span>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleGrupo(g) {
  gruposAbiertos[g] = gruposAbiertos[g]===false ? true : false;
  renderPosiciones();
}

  { nombre:'32avos de Final', fase:'32vos',   icono:'⚽' },
  { nombre:'Octavos de Final', fase:'Octavos', icono:'🔥' },
  { nombre:'Cuartos de Final', fase:'Cuartos', icono:'⚡' },
  { nombre:'Semifinales',      fase:'Semis',   icono:'🏟' },
  { nombre:'Gran Final',       fase:'Final',   icono:'🏆' },
];

function mkBkPartido(p, num) {
  const r   = RESULTADOS[p.id];
  const ft  = r?.estado === 'ft';
  const lv  = r?.estado === 'live';
  const fechaCorta = p.dia.replace('de junio','jun').replace('de julio','jul')
    .split(' ').slice(0,3).join(' ');

  // Marcar ganador en ft
  let clsL='', clsV='';
  if (ft) {
    if (r.gL > r.gV) clsL='ganador';
    else if (r.gV > r.gL) clsV='ganador';
  }

  const numBadge = num != null
    ? `<span class="bk-num">${num}</span>` : '';

  return `<div class="bk-partido ${lv?'live-now':''}">
    <div class="bk-meta">
      ${numBadge}
      <span class="bk-meta-fecha">${fechaCorta}</span>
      <span class="bk-meta-hora">${p.hora}</span>
      ${lv?'<span class="bk-live-pip"></span>':''}
    </div>
    <div class="bk-eq ${clsL} ${ft||lv?'definido':''}">
      <span class="bk-eq-flag">${flag(p.local)}</span>
      <span class="bk-eq-name">${p.local}</span>
      ${ft||lv?`<span class="bk-eq-gol">${r.gL}</span>`:''}
    </div>
    <div class="bk-eq ${clsV} ${ft||lv?'definido':''}">
      <span class="bk-eq-flag">${flag(p.visita)}</span>
      <span class="bk-eq-name">${p.visita}</span>
      ${ft||lv?`<span class="bk-eq-gol">${r.gV}</span>`:''}
    </div>
  </div>`;
}

function renderLlaves() {
  const div = document.getElementById('llaves');
  // Numerado global continuo por fase
  const contadores = { '32vos':1, 'Octavos':1, 'Cuartos':1, 'Semis':1, 'Final':1 };

  div.innerHTML = `<div class="bracket-wrap">` +
    FASES_ELIM.map(f => {
      const partidos = PARTIDOS.filter(p => p.fase === f.fase);
      if (!partidos.length) return '';

      // Final centrada
      if (f.fase === 'Final') {
        return `<div class="bracket-fase">
          <div class="bracket-fase-titulo">${f.nombre}</div>
          <div class="bracket-final">${mkBkPartido(partidos[0], null)}</div>
        </div>`;
      }

      // Dos columnas con numerado: izq numerado izq→abajo, der numerado der→abajo
      const mitad = Math.ceil(partidos.length / 2);
      const izq   = partidos.slice(0, mitad);
      const der   = partidos.slice(mitad);

      // Numerar: izq = 1,3,5… der = 2,4,6…
      const cols = izq.map((p, i) => {
        const numIzq = i * 2 + 1;
        const numDer = i * 2 + 2;
        const pDer   = der[i];
        return `<div>${mkBkPartido(p, numIzq)}</div>
                <div>${pDer ? mkBkPartido(pDer, numDer) : ''}</div>`;
      }).join('');

      return `<div class="bracket-fase">
        <div class="bracket-fase-titulo">${f.nombre}</div>
        <div class="bracket-cols">${cols}</div>
      </div>`;
    }).join('') +
  `</div>`;
}

// ── PRE-CACHE EN BACKGROUND ──
async function preCachearPartidos() {
  const hoy = fechaHoyARG();
  const ayer = (() => { const d = new Date(hoy + 'T12:00:00'); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const partidos = Object.values(RESULTADOS).filter(r => {
    if (!r.fixtureId) return false;
    // FT de hoy y ayer, y partidos en vivo
    const esFT = ['FT','AET','PEN'].includes(r.estado);
    const esVivo = ['1H','2H','HT','ET','P'].includes(r.estado);
    return esVivo || (esFT && (r.fecha === hoy || r.fecha === ayer));
  });

  // Pre-cachear de a uno con delay para no saturar la API
  for (const r of partidos) {
    try {
      await apiFetch(`fixtures/events?fixture=${r.fixtureId}`);
      await apiFetch(`fixtures/lineups?fixture=${r.fixtureId}`);
      await apiFetch(`fixtures/statistics?fixture=${r.fixtureId}`);
      await new Promise(res => setTimeout(res, 300)); // 300ms entre cada partido
    } catch(e) {}
  }
}

// ── INIT ──
buildFechaChips();
// Prefiltrar al día correcto al abrir:
// Si son madrugada y hay partido en vivo de ayer → quedarse en ayer
// Si no, ir a hoy
const hoyFecha = fechaHoyARG();
const ahoraMins = (() => { const n = new Date(); return n.getUTCHours() * 60 + n.getUTCMinutes() - 180; })(); // minutos ARG desde medianoche
const esAltaMadrugada = ahoraMins >= 0 && ahoraMins < 180; // entre 00:00 y 03:00 ARG
const ayerFecha = (() => { const d = new Date(hoyFecha + 'T12:00:00'); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
const hayAyer = PARTIDOS.some(p => p.fecha === ayerFecha);
const hayHoy  = PARTIDOS.some(p => p.fecha === hoyFecha);
// Si es madrugada y hay partidos de ayer → mostrar ayer por defecto
// (los partidos en vivo de ayer se detectan después de cargarResultados)
if (esAltaMadrugada && hayAyer) {
  fechaActiva = ayerFecha;
  buildFechaChips();
} else if (hayHoy) {
  fechaActiva = hoyFecha;
  buildFechaChips();
}
// Limpiar entradas vacías del localStorage (fix una sola vez)
try {
  const version = '4';
  if (localStorage.getItem('ds_cache_version') !== version) {
    Object.keys(localStorage).filter(k => k.startsWith('ds_')).forEach(k => localStorage.removeItem(k));
    localStorage.setItem('ds_cache_version', version);
  }
} catch(e) {}

// Ajustar padding-top al alto real del header
function ajustarHeader() {
  const h = document.querySelector('header');
  if (h) {
    const altura = h.getBoundingClientRect().height;
    document.documentElement.style.setProperty('--header-h', altura + 'px');
  }
}
ajustarHeader();
window.addEventListener('resize', ajustarHeader);

render();
cargarResultados().then(() => {
  iniciarPolling();
  setInterval(() => { iniciarPolling(); }, 300000);
  // Pre-cachear en background detalles de partidos FT y en vivo de hoy
  preCachearPartidos();
  // Tras cargar resultados: si es madrugada y hay partido en vivo de ayer, ir a ayer
  if (esAltaMadrugada && hayAyer) {
    const hayVivoAyer = Object.values(RESULTADOS).some(r => r.estado === 'live');
    if (hayVivoAyer) {
      fechaActiva = ayerFecha;
    } else {
      // No hay partido en vivo de ayer, ir a hoy si hay partidos
      if (hayHoy && fechaActiva === ayerFecha) fechaActiva = hoyFecha;
    }
    buildFechaChips();
    render();
  }
});
cargarFaseFinal();
</script>
