<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DataSports — Mundial 2026</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Raleway:wght@400;700&display=swap');

  :root {
    --header-h: 80px;
    --sidebar-w: 160px;
    --bottom-nav-h: 62px;
    --azul:   #2A398D;
    --verde:  #4CAF50;
    --rojo:   #E61D25;
    --fondo:  #0e0e1a;
    --card:   #181830;
    --mid:    #1c1c38;
    --borde:  #2a2a50;
    --texto:  #ffffff;
    --muted:  #8888aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { background: #0e0e1a; }

  body {
    background: var(--fondo);
    color: var(--texto);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: 80px;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--azul) 0%, var(--fondo) 100%);
    padding: 14px 16px 0;
    text-align: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 30;
    overflow: hidden;
  }
  header::before {
    content:''; position:absolute; top:-50px; right:-50px;
    width:200px; height:200px; border-radius:50%;
    background: rgba(60,172,59,0.07);
  }
  header::after {
    content:''; position:absolute; bottom:0; left:0; right:0;
    height:0;
  }
  header h1 {
    font-family:'Inter',sans-serif;
    font-size: 2.6rem; letter-spacing:3px; color:#fff; line-height:1;
  }
  header h1 span { color: var(--verde); }
  header p { font-size:.72rem; color:rgba(255,255,255,.55); margin-top:4px; letter-spacing:1px; text-transform:uppercase; }
  /* Barra tricolor debajo del header: verde | azul | rojo */
  .header-bar {
    display:flex; height:3px; margin-top:16px;
  }
  .header-bar span { flex:1; }
  .header-bar span:nth-child(1) { background:var(--verde); }
  .header-bar span:nth-child(2) { background:var(--azul); }
  .header-bar span:nth-child(3) { background:var(--rojo); }

  /* ── NAV TABS ── */
  .tabs {
    display:flex; overflow-x:auto; scrollbar-width:none;
    border-bottom: 1px solid var(--borde);
    background: var(--card);
    position: sticky; top:0; z-index:10;
  }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0; padding:14px 20px;
    font-size:.9rem; font-weight:700; letter-spacing:.5px;
    text-transform:uppercase; color:var(--muted);
    border-bottom:3px solid transparent;
    cursor:pointer; transition: all .2s; white-space:nowrap;
    background:none; border-left:none; border-right:none; border-top:none;
    font-family:'Inter',sans-serif;
  }
  .tab.active { color:#fff; border-bottom-color: var(--verde); }

  /* ── BUSCADOR ── */
  .search-wrap { padding:12px 12px 0; position:relative; }
  .sugerencias {
    position:absolute; top:100%; left:0; right:0;
    background:var(--card); border:1px solid var(--verde);
    border-radius:0 0 10px 10px; z-index:50;
    max-height:200px; overflow-y:auto; display:none;
  }
  .sugerencias.visible { display:block; }
  .sug-item {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; cursor:pointer; font-size:.85rem;
    border-bottom:1px solid var(--borde); color:#fff;
    transition:background .15s;
  }
  .sug-item:last-child { border-bottom:none; }
  .sug-item:hover { background:var(--mid); }

  /* ── FORMACIONES ── */
  .po-formacion-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .po-equipo-form { background:var(--mid); border-radius:10px; padding:10px 12px; }
  .po-form-titulo { font-size:.65rem; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:.5px; margin-bottom:4px; }
  .po-form-nombre { font-size:.8rem; font-weight:700; color:#fff; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .po-form-sistema { font-family:'Inter',sans-serif; font-size:1.1rem; color:var(--verde); letter-spacing:1px; margin-bottom:8px; }
  .po-jugador { display:flex; align-items:center; gap:5px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,.05); font-size:.72rem; }
  .po-jugador:last-child { border-bottom:none; }
  .po-num { color:var(--muted); font-size:.68rem; width:16px; text-align:right; flex-shrink:0; }
  .po-jugador-nombre { flex:1; color:#fff; }
  .po-suplente .po-jugador-nombre { color:var(--muted); }
  .search-box {
    display:flex; align-items:center; gap:8px;
    background:var(--mid); border:1.5px solid var(--borde);
    border-radius:10px; padding:0 12px; transition:border-color .2s;
  }
  .search-box:focus-within { border-color:var(--verde); }
  .search-input {
    flex:1; background:none; border:none; outline:none;
    color:#fff; font-family:'Inter',sans-serif;
    font-size:.88rem; padding:11px 0;
  }
  .search-input::placeholder { color:var(--muted); }
  .search-clear { background:none; border:none; color:var(--muted); font-size:1rem; cursor:pointer; display:none; }
  .search-clear.visible { display:block; }

  /* ── CHIPS FECHA ── */
  .fecha-scroll {
    display:flex; gap:6px; padding:10px 12px 0;
    overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .fecha-scroll::-webkit-scrollbar { display:none; }
  .fecha-chip {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center;
    background:var(--mid); border:1.5px solid var(--borde);
    border-radius:10px; padding:5px 9px; cursor:pointer;
    transition:all .15s; min-width:44px;
  }
  .fecha-chip:hover { border-color:var(--verde); }
  .fecha-chip.active { background:var(--azul); border-color:var(--verde); }
  .fecha-chip.hoy-chip { border-color:var(--rojo); }
  .chip-dow { font-size:.58rem; font-weight:700; text-transform:uppercase; color:var(--muted); }
  .fecha-chip.active .chip-dow { color:rgba(255,255,255,.7); }
  .fecha-chip.hoy-chip .chip-dow { color:var(--rojo); }
  .chip-num { font-family:'Inter',sans-serif; font-size:1.25rem; color:#fff; line-height:1.1; }
  .chip-mes { font-size:.55rem; color:var(--muted); text-transform:uppercase; font-weight:600; }
  .fecha-chip.active .chip-mes { color:rgba(255,255,255,.6); }

  /* ── FASE NAV ── */
  .fase-nav {
    display:flex; gap:6px; padding:10px 12px 0;
    overflow-x:auto; scrollbar-width:none;
  }
  .fase-nav::-webkit-scrollbar { display:none; }
  .fase-btn {
    flex-shrink:0; background:var(--mid); border:1.5px solid var(--borde);
    color:var(--muted); font-family:'Inter',sans-serif;
    font-size:.7rem; font-weight:600; text-transform:uppercase;
    padding:6px 13px; border-radius:20px; cursor:pointer; transition:all .2s;
  }
  .fase-btn:hover { border-color:var(--verde); color:var(--verde); }
  .fase-btn.active { background:var(--azul); border-color:var(--verde); color:#fff; }

  /* ── FIXTURE ── */
  main { padding:10px 12px 0; }

  .dia-block { margin-bottom:7px; }
  /* Skeleton loader */
  .skeleton { background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-partido { height:64px; margin:4px 0; }

  .dia-header {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; background:var(--mid);
    border-radius:10px 10px 0 0; cursor:pointer;
    border-left:4px solid var(--verde); transition:background .15s;
  }
  .dia-header:hover { background:#222244; }
  .dia-header.closed { border-radius:10px; }
  /* Día con partido en vivo: barra roja */
  .dia-header.tiene-live { border-left-color: var(--rojo); }
  .dia-header.tiene-live .dia-count { background: var(--rojo); }
  .dia-fecha { font-family:'Inter',sans-serif; font-size:.82rem; font-weight:700; letter-spacing:.3px; color:#fff; flex:1; text-transform:uppercase; }
  .dia-fecha .dia-nombre { color:var(--verde); margin-right:5px; }
  .dia-count { background:var(--verde); color:#fff; font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:12px; }
  .chevron { color:var(--muted); font-size:.9rem; transition:transform .2s; }
  .dia-header.closed .chevron { transform:rotate(-90deg); }
  .today-badge { background:var(--rojo); color:#fff; font-size:.6rem; font-weight:700; padding:2px 7px; border-radius:10px; text-transform:uppercase; }

  .partidos-list { background:var(--card); border-radius:0 0 10px 10px; overflow:hidden; border-left:4px solid var(--verde); }

  .partido {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-bottom:1px solid var(--borde);
    transition:background .15s;
  }
  .partido:last-child { border-bottom:none; }
  .partido:hover { background:#1e1e3a; }
  .partido-highlight { background:rgba(60,172,59,.09) !important; border-left:3px solid var(--verde); }

  .hora { font-family:'Inter',sans-serif; font-size:.82rem; font-weight:600; color:var(--verde); width:50px; flex-shrink:0; }
  .hora-fin  { font-family:'Inter',sans-serif; font-size:.68rem; font-weight:700; color:#fff; background:var(--mid); border:1px solid var(--borde); border-radius:5px; width:44px; flex-shrink:0; text-align:center; padding:2px 4px; letter-spacing:1px; }
  .hora-live { font-family:'Inter',sans-serif; font-size:.85rem; color:var(--rojo); width:50px; flex-shrink:0; text-align:center; animation:pulso 1.5s infinite; }

  .partido-info { flex:1; min-width:0; }
  .equipos {
    font-size:.88rem; font-weight:600; color:#fff;
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    gap:6px;
  }
  .equipo-nombre {
    display:flex; align-items:center; gap:5px;
    min-width:0; overflow:hidden;
  }
  .equipo-nombre span.eq-text {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-size:.78rem; font-weight:500;
  }
  .equipo-nombre.local  { flex-direction:row; justify-content:flex-start; }
  .equipo-nombre.visita { flex-direction:row-reverse; justify-content:flex-start; }
  .eq-flag { font-size:.95rem; flex-shrink:0; }
  .vs-wrap {
    color:var(--muted); font-weight:400; font-size:.72rem;
    text-align:center; flex-shrink:0; padding:0 2px;
    white-space:nowrap;
  }

  /* Resultado inline */
  .resultado-badge {
    display:inline-flex; align-items:center; gap:4px;
    border-radius:6px; padding:2px 10px;
    flex-shrink:0; width:auto;
    font-family:'Inter',sans-serif; font-size:1.1rem; letter-spacing:2px;
  }
  .resultado-badge.finalizado { background:var(--mid); border:1px solid var(--borde); }
  .resultado-badge.en-vivo { background:rgba(230,29,37,.12); border:1px solid var(--rojo); animation:pulso 1.5s infinite; }
  .gol-local, .gol-visita { color:#fff; min-width:12px; text-align:center; }
  .sep-gol { color:var(--muted); font-size:.8rem; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--rojo); margin-left:2px; }

  @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:.5} }

  .meta { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
  .tag { font-size:.64rem; font-weight:600; padding:2px 7px; border-radius:10px; text-transform:uppercase; }
  .tag-grupo { background:rgba(60,172,59,.15); color:var(--verde); border:1px solid rgba(60,172,59,.3); }
  .tag-sede { background:rgba(255,255,255,.05); color:var(--muted); }
  .tag-fase { background:rgba(230,29,37,.15); color:var(--rojo); border:1px solid rgba(230,29,37,.3); }
  .tag-madrugada { background:rgba(42,57,141,.3); color:#aaaaff; border:1px solid rgba(42,57,141,.5); }

  /* ── POSICIONES ── */
  #posiciones { padding:10px 12px 0; }

  .grupo-card {
    background:var(--card); border-radius:12px;
    overflow:hidden; margin-bottom:10px;
    border:1px solid var(--borde);
  }
  .grupo-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:var(--azul);
    cursor:pointer; position:relative;
  }
  .grupo-header::after {
    content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--verde) 0%, var(--azul) 50%, var(--rojo) 100%);
  }
  .grupo-titulo { font-family:'Inter',sans-serif; font-size:1.2rem; letter-spacing:1.5px; color:#fff; }
  .grupo-equipos-mini { font-size:.7rem; color:rgba(255,255,255,.6); margin-top:2px; }
  .grupo-chevron { color:rgba(255,255,255,.6); font-size:.9rem; transition:transform .2s; }
  .grupo-header.closed .grupo-chevron { transform:rotate(-90deg); }

  .tabla-wrap { overflow-x:hidden; }
  table { width:100%; border-collapse:collapse; font-size:.78rem; table-layout:fixed; }
  th {
    padding:7px 4px; text-align:center; color:var(--muted);
    font-size:.6rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.3px; border-bottom:1px solid var(--borde);
    white-space:nowrap; overflow:hidden;
  }
  th:first-child { text-align:left; padding-left:12px; width:45%; }
  td {
    padding:9px 4px; text-align:center;
    border-bottom:1px solid rgba(42,42,80,.5);
    white-space:nowrap; overflow:hidden;
  }
  td:first-child { text-align:left; padding-left:12px; }
  tr:last-child td { border-bottom:none; }

  .pos-num { color:var(--muted); font-size:.72rem; width:16px; display:inline-block; text-align:right; }
  .pos-1, .pos-2 { background:rgba(60,172,59,.07); }
  .pos-1 .pos-num { color:var(--verde); font-weight:700; }
  .pos-2 .pos-num { color:var(--verde); }
  .pos-3 { background:rgba(42,57,141,.1); }
  .pos-4 { }

  .equipo-td { display:flex; align-items:center; gap:8px; }
  .bandera { font-size:1.1rem; }
  .eq-nombre { font-weight:600; font-size:.82rem; }
  .pts-td { font-weight:700; color:#fff; font-size:.9rem; }
  .dg-pos { color:var(--verde); }
  .dg-neg { color:var(--rojo); }
  .clasifica-bar {
    width:3px; position:absolute; left:0; top:0; bottom:0;
    border-radius:0;
  }

  .leyenda-tabla {
    display:flex; gap:12px; padding:8px 14px;
    font-size:.62rem; color:var(--muted);
    border-top:1px solid var(--borde); flex-wrap:wrap;
  }
  .leyenda-dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:4px; }

  /* ── NO RESULT ── */
  .no-result { text-align:center; padding:48px 20px; color:var(--muted); }
  .no-result .nr-icon { font-size:2.5rem; margin-bottom:10px; }
  .no-result p { font-size:.9rem; }
  .no-result small { font-size:.75rem; opacity:.6; }

  /* ── PRE PARTIDO — CONVOCADOS ── */
  .pre-partido {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin-top:12px;
  }
  .convocados-col { min-width:0; }
  .convocados-titulo {
    font-size:.68rem; font-weight:700; text-transform:uppercase;
    color:var(--muted); letter-spacing:.5px;
    padding:6px 0 8px; border-bottom:1px solid var(--borde);
    margin-bottom:6px;
  }
  .convocado-item {
    display:flex; align-items:center; gap:6px;
    padding:5px 0; border-bottom:1px solid rgba(255,255,255,.04);
    cursor:pointer; transition:background .15s;
  }
  .convocado-item:last-child { border-bottom:none; }
  .convocado-item:hover { background:rgba(255,255,255,.04); border-radius:6px; padding-left:4px; }
  .conv-foto {
    width:28px; height:28px; border-radius:50%;
    object-fit:cover; flex-shrink:0; border:1px solid var(--borde);
    background:var(--mid);
  }
  .conv-info { flex:1; min-width:0; }
  .conv-nombre { font-size:.75rem; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-pos { font-size:.62rem; color:var(--muted); }
  .conv-num { font-family:'Inter',sans-serif; font-size:.9rem; color:var(--muted); width:18px; text-align:right; flex-shrink:0; }
  .conv-derecha { flex-direction:row-reverse; }
  .conv-derecha .conv-info { text-align:right; }

  /* Ficha jugador */
  .ficha-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.85);
    z-index:200; display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .ficha-card {
    background:var(--card); border-radius:16px; padding:20px;
    max-width:320px; width:100%; border:1px solid var(--borde);
    position:relative;
  }
  .ficha-close {
    position:absolute; top:12px; right:12px;
    background:none; border:none; color:var(--muted);
    font-size:1.2rem; cursor:pointer;
  }
  .ficha-header { display:flex; gap:14px; align-items:center; margin-bottom:14px; }
  .ficha-foto { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid var(--verde); }
  .ficha-nombre { font-size:1rem; font-weight:700; color:#fff; }
  .ficha-sub { font-size:.75rem; color:var(--muted); margin-top:2px; }
  .ficha-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
  .ficha-stat { background:var(--mid); border-radius:8px; padding:8px 10px; }
  .ficha-stat-val { font-family:'Inter',sans-serif; font-size:1.3rem; color:var(--verde); }
  .ficha-stat-label { font-size:.62rem; color:var(--muted); text-transform:uppercase; }

  /* ── TABS DEL PARTIDO ── */
  .po-tabs {
    display:flex; border-bottom:1px solid var(--borde);
    margin-bottom:12px;
  }
  .po-tab {
    flex:1; padding:8px 4px; text-align:center;
    font-size:.7rem; font-weight:700; color:var(--muted);
    cursor:pointer; border-bottom:2px solid transparent;
    text-transform:uppercase; letter-spacing:.3px;
    background:none; border-top:none; border-left:none; border-right:none;
    font-family:'Inter',sans-serif;
  }
  .po-tab.activa { color:var(--verde); border-bottom-color:var(--verde); }

  /* Estadísticas */
  .stats-grid { display:grid; grid-template-columns:1fr auto 1fr; gap:5px 8px; align-items:center; }
  .stat-local  { text-align:right; font-size:.78rem; color:#fff; font-weight:600; }
  .stat-visita { text-align:left;  font-size:.78rem; color:#fff; font-weight:600; }
  .stat-label  { text-align:center; font-size:.6rem; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
  .stat-bar-wrap { grid-column:1/-1; display:flex; height:3px; border-radius:2px; overflow:hidden; margin-bottom:2px; }
  .stat-bar-l { background:var(--verde); }
  .stat-bar-v { background:var(--rojo); }

  .po-card { width:100%; padding:16px; box-sizing:border-box; }
  .po-header {
    display:flex; align-items:center; gap:10px;
    padding-bottom:14px; border-bottom:1px solid var(--borde);
    margin-bottom:16px;
  }
  .po-back {
    background:none; border:none; color:var(--verde);
    font-size:.85rem; font-weight:700; cursor:pointer;
    font-family:'Inter',sans-serif; padding:0;
  }
  .po-fase { color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.5px; flex:1; }
  .po-live { background:var(--rojo); color:#fff; font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:10px; animation:pulso 1.2s infinite; }
  .po-ft   { background:var(--mid); color:var(--muted); font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:10px; }

  .po-marcador {
    display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:12px;
    background:var(--card); border-radius:14px;
    padding:20px 16px; margin-bottom:16px;
    border:1px solid var(--borde);
  }
  .po-marcador.po-proxim { grid-template-columns:1fr auto 1fr; }
  .po-equipo { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .po-flag { font-size:2rem; line-height:1; }
  .po-nombre { font-size:.8rem; font-weight:700; text-align:center; color:#fff; }
  .po-score-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .po-score { font-family:'Inter',sans-serif; font-size:3rem; color:#fff; letter-spacing:2px; line-height:1; }
  .po-hora-big { font-family:'Inter',sans-serif; font-size:2rem; color:var(--verde); letter-spacing:1px; }

// ── Fecha actual en horario Argentina (UTC-3) ──
function fechaHoyARG() {
  const now = new Date();
  // Restar 3 horas para pasar de UTC a ARG
  const arg = new Date(now.getTime() - 3 * 60 * 60 * 1000);
  return arg.toISOString().slice(0,10);
}

// ── Llamada via proxy Netlify ──
async function apiFetch(endpoint) {
  const [path, qs] = endpoint.split('?');
  const params = new URLSearchParams(qs || '');
  params.set('path', path);

  // TTL según tipo de llamada
  let ttlSeg = 120;
  if (path.includes('fixtures/events') || path.includes('fixtures/statistics')) ttlSeg = 20;
  else if (endpoint.includes('status=1H') || endpoint.includes('status=2H') || endpoint.includes('status=HT') || endpoint.includes('status=ET') || endpoint.includes('status=P')) ttlSeg = 30;
  // Lista de partidos FT (cambia cada vez que termina un partido nuevo) — TTL corto
  else if (path === 'fixtures' && (endpoint.includes('status=FT') || endpoint.includes('status=AET') || endpoint.includes('status=PEN'))) ttlSeg = 30;
  else if (path.includes('predictions')) ttlSeg = 86400;
  else if (endpoint.includes('status=NS') || path.includes('standings') || path.includes('squads') || path.includes('players')) ttlSeg = 300;
  else if (path.includes('lineups')) ttlSeg = 86400; // lineups de un fixture puntual no cambian
  else if (path === 'fixtures' && endpoint.includes('id=')) ttlSeg = 86400; // fixture individual FT

  // Intentar desde caché local
  const cacheKey = 'ds_' + endpoint;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < ttlSeg * 1000) return data;
    }
  } catch(e) {}

  // Llamar al Worker
  const res = await fetch(`https://datasports-api.vidaljonathanh.workers.dev?${params.toString()}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();

  // Guardar en caché local SOLO si hay datos (no cachear respuestas vacías)
  if (data.results > 0 || (Array.isArray(data.response) && data.response.length > 0)) {
    try {
      localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data }));
    } catch(e) {
      // localStorage lleno — limpiar caché viejo
      try {
        Object.keys(localStorage).filter(k => k.startsWith('ds_')).forEach(k => localStorage.removeItem(k));
        localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), data }));
      } catch(e2) {}
    }
  }

  return data;
}

  const l = mapTeam(localAPI);
  const v = mapTeam(visitaAPI);
  return PARTIDOS.find(p =>
    (p.local === l && p.visita === v) ||
    (p.local === v && p.visita === l)
  );
}

// ── Procesar fixture de la API y guardar en RESULTADOS ──
function procesarFixture(fixture) {
  const { fixture: f, teams, goals, events } = fixture;
  const localAPI  = teams.home.name;
  const visitaAPI = teams.away.name;
  const partido   = findPartidoLocal(localAPI, visitaAPI);
  if (!partido) return;

  const status = f.status.short; // NS, 1H, HT, 2H, ET, PEN, FT, AET, PEN
  let estado = null;
  if (['1H','HT','2H','ET','BT','P'].includes(status)) estado = 'live';
  else if (['FT','AET','PEN'].includes(status)) estado = 'ft';

  if (!estado) return;

  // Determinar si local en API = local en nuestro fixture
  const invertido = mapTeam(localAPI) !== partido.local;
  const gL = invertido ? goals.away  : goals.home;
  const gV = invertido ? goals.home  : goals.away;

  RESULTADOS[partido.id] = {
    estado,
    gL: gL ?? 0,
    gV: gV ?? 0,
    min: f.status.elapsed,
    fixtureId: f.id,
    eventos: events || [],
    equipos: { local: teams.home, visita: teams.away },
    invertido,
  };

  fixtureCache[f.id] = fixture;
}

// ── Cargar y actualizar partidos de fase-final desde la API ──
async function cargarFaseFinal() {
  try {
    const data = await apiFetch(`fixtures?league=1&season=2026&stage=Round of 32`);
    const fixtures = data.response || [];
    if (!fixtures.length) return;

    fixtures.forEach(f => {
      const localNombre  = mapTeam(f.teams?.home?.name || '');
      const visitaNombre = mapTeam(f.teams?.away?.name || '');
      if (!localNombre || !visitaNombre) return;

      // Buscar si ya existe en PARTIDOS
      const existe = PARTIDOS.find(p => p.fixtureId === f.fixture?.id);
      if (existe) {
        existe.local  = localNombre;
        existe.visita = visitaNombre;
        return;
      }

      // Buscar el partido de placeholder y actualizarlo
      const placeholder = PARTIDOS.find(p =>
        p.fase === '32vos' && (p.local.includes('°') || p.visita.includes('°')) &&
        !RESULTADOS[p.id]
      );
      if (placeholder) {
        placeholder.local     = localNombre;
        placeholder.visita    = visitaNombre;
        placeholder.fixtureId = f.fixture?.id;
        const d = new Date(f.fixture.date);
        placeholder.fecha = d.toISOString().slice(0,10);
      }
    });
  } catch(e) {
    console.log('Sin datos de fase-final aún');
  }
}

async function cargarResultados() {
  try {
    // Hacer llamadas separadas por cada status para evitar problemas con guiones
    // Una sola llamada con todos los status — mucho más rápido
    const [jugados, enVivo, ns] = await Promise.all([
      apiFetch(`fixtures?league=1&season=2026&status=FT-AET-PEN`),
      apiFetch(`fixtures?league=1&season=2026&status=1H-HT-2H-ET-P`),
      apiFetch(`fixtures?league=1&season=2026&status=NS`),
    ]);

    [jugados, enVivo].forEach(data => {
      if (data.response) data.response.forEach(procesarFixtureAF);
    });

    // Guardar fixtureId en PARTIDOS para partidos NS (permite cargar lineups pre-partido)
    if (ns?.response) {
      ns.response.forEach(f => {
        const localAPI  = f.teams?.home?.name || '';
        const visitaAPI = f.teams?.away?.name || '';
        const partido   = findPartidoLocal(localAPI, visitaAPI);
        if (partido && !partido.fixtureId) {
          partido.fixtureId = f.fixture?.id;
        }
        // Guardar en fixtureCache para que el overlay lo encuentre
        if (f.fixture?.id) fixtureCache[f.fixture.id] = f;
      });
    }

    render();
    if (tabActual === 'posiciones') renderPosiciones();
    // Pre-cachear en vivo después de cada polling
    if (hayPartidoEnCurso()) preCachearPartidos();
    // Si hay un partido abierto en vivo, refrescar sus datos sin cerrar el overlay
    if (partidoAbierto !== null) {
      const r = RESULTADOS[partidoAbierto];
      if (r && ['1H','2H','HT','ET','P'].includes(r.estado)) {
        refrescarOverlayVivo();
      }
    }
  } catch(e) {
    console.error('Error cargando resultados:', e);
  }
}

// ── Procesar fixture de api-football ──
function procesarFixtureAF(f) {
  const localAPI  = f.teams?.home?.name || '';
  const visitaAPI = f.teams?.away?.name || '';
  const partido   = findPartidoLocal(localAPI, visitaAPI);
  if (!partido) {
    console.log('No encontrado:', localAPI, 'vs', visitaAPI);
    return;
  }

  const status = f.fixture?.status?.short || '';
  let estado = null;
  if (['FT','AET','PEN'].includes(status)) estado = 'ft';
  else if (['1H','HT','2H','ET','BT','P'].includes(status)) estado = 'live';
  if (!estado) return;

  const invertido = mapTeam(localAPI) !== partido.local;
  const gL = parseInt(invertido ? f.goals?.away : f.goals?.home) || 0;
  const gV = parseInt(invertido ? f.goals?.home : f.goals?.away) || 0;

  RESULTADOS[partido.id] = {
    estado,
    gL,
    gV,
    min: f.fixture?.status?.elapsed || null,
    fixtureId: f.fixture?.id,
    eventos: f.events || [],
    equipos: { local: f.teams?.home, visita: f.teams?.away },
    invertido,
  };
}

// ── Polling inteligente ──
function hayPartidoEnCurso() {
  return Object.values(RESULTADOS).some(r => r.estado === 'live');
}

function hayPartidoHoy() {
  const hoy = fechaHoyARG();
  return PARTIDOS.some(p => p.fecha === hoy);
}

function iniciarPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  // Si hay partido en vivo: cada 60 segundos
  // Si hay partido hoy pero no en vivo: cada 5 minutos
  // Si no hay partido hoy: no hace polling
  if (hayPartidoEnCurso()) {
    pollingInterval = setInterval(cargarResultados, 60000);
  } else if (hayPartidoHoy()) {
    pollingInterval = setInterval(cargarResultados, 300000);
  }
}

    const idLocal  = TEAM_IDS[p.local]  || null;

    overlay.innerHTML = `
      <div class="po-card">
        <div class="po-header">
          <button class="po-back" onclick="cerrarPartido()">← Volver</button>
          <span class="po-fase">${p.grupo ? 'Grupo '+p.grupo : p.fase}</span>
        </div>
        <div class="po-marcador po-proxim">
          <div class="po-equipo">
            <div class="po-flag">${flag(p.local, 32)}</div>
            <div class="po-nombre">${p.local}</div>
          </div>
          <div class="po-score-wrap">
            <div class="po-hora-big">${p.hora}</div>
            <div class="po-fecha-small">${p.dia}</div>
            <div class="po-sede-small">${p.sede.split(',')[0]}</div>
          </div>
          <div class="po-equipo">
            <div class="po-flag">${flag(p.visita, 32)}</div>
            <div class="po-nombre">${p.visita}</div>
          </div>
        </div>
        <div id="po-convocados"><div class="po-sin-datos">Cargando convocados...</div></div>
      </div>`;

    // Cargar convocados y posibles formaciones pre-partido
    if (idLocal && idVisita) {
      try {
        // Buscar el fixtureId del partido desde la API aunque no esté en RESULTADOS
        let fixtureIdPre = r?.fixtureId || p?.fixtureId || null;
        if (!fixtureIdPre) {
          // Buscar por equipos en la API (fallback)
          const fxData = await apiFetch(`fixtures?league=1&season=2026&team=${idLocal}&status=NS`);
          const fxMatch = fxData.response?.find(f => 
            (f.teams?.home?.id === idLocal && f.teams?.away?.id === idVisita) ||
            (f.teams?.home?.id === idVisita && f.teams?.away?.id === idLocal)
          );
          if (fxMatch) fixtureIdPre = fxMatch.fixture?.id;
        }

        const [resL, resV, resLineup, resFxInfo, resPred] = await Promise.allSettled([
          apiFetch(`players/squads?team=${idLocal}`),
          apiFetch(`players/squads?team=${idVisita}`),
          fixtureIdPre ? apiFetch(`fixtures/lineups?fixture=${fixtureIdPre}`) : Promise.resolve({response:[]}),
          fixtureIdPre ? apiFetch(`fixtures?id=${fixtureIdPre}`) : Promise.resolve({response:[]}),
          fixtureIdPre ? apiFetch(`predictions?fixture=${fixtureIdPre}`) : Promise.resolve({response:[]})
        ]);
        const sqL      = resL.status      === 'fulfilled' ? resL.value      : {response:[]};
        const sqV      = resV.status      === 'fulfilled' ? resV.value      : {response:[]};
        const lineupPre = resLineup.status === 'fulfilled' ? resLineup.value : {response:[]};
        const fxInfoPre = resFxInfo.status === 'fulfilled' ? resFxInfo.value : {response:[]};
        const predPre   = resPred.status   === 'fulfilled' ? resPred.value   : {response:[]};

        const jugL = sqL.response?.[0]?.players || [];
        const jugV = sqV.response?.[0]?.players || [];
        let lineups = lineupPre?.response || [];

        // Si no hay lineups confirmados, usar formación probable de predictions
        const esProable = lineups.length < 2;
        if (esProable) {
          const pred = predPre?.response?.[0];
          const lineupsProb = pred?.lineups;
          if (lineupsProb) {
            const equipos = Object.keys(lineupsProb);
            if (equipos.length >= 2) {
              lineups = equipos.map(eq => ({
                team: { name: eq },
                formation: lineupsProb[eq]?.formation || '',
                startXI: [],
                substitutes: [],
                _probable: true
              }));
            }
          }
        }

        const posOrder = {'Goalkeeper':1,'Defender':2,'Midfielder':3,'Attacker':4};
        const sortJug = j => (posOrder[j.position]||5)*100 + (j.number||99);

        function convHTML(jug, esLocal) {
          return [...jug].sort((a,b) => sortJug(a)-sortJug(b)).map(j => {
            const posCorta = j.position === 'Goalkeeper' ? 'POR' :
                             j.position === 'Defender'   ? 'DEF' :
                             j.position === 'Midfielder' ? 'MED' : 'DEL';
            return `<div class="convocado-item ${esLocal?'':'conv-derecha'}" 
              onclick="abrirFicha(${j.id},'${j.name.replace(/'/g,'&#39;')}','${j.photo}',${j.age},'${j.position}')">
              <img class="conv-foto" src="${j.photo}" alt="${j.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 28 28%22><rect width=%2228%22 height=%2228%22 fill=%22%231c1c38%22/></svg>'">
              <div class="conv-info">
                <div class="conv-nombre">${j.name}</div>
                <div class="conv-pos">${posCorta} · ${j.age} años</div>
              </div>
              <div class="conv-num">${j.number||''}</div>

        // Estadio y capacidad desde el fixture

            🏟 ${fxVenue.name}${fxVenue.city ? ', '+fxVenue.city : ''}
          </div>` : '';

        // Si hay formaciones confirmadas — armar tabs
        const hayFormaciones = lineups.length >= 2;
        const labelFormTab = esProable ? 'Formación probable' : 'Formaciones';
        const badgeProbable = esProable ? `<span style="background:transparent;color:rgba(255,255,255,.45);font-size:.55rem;font-weight:600;margin-left:4px;vertical-align:middle;letter-spacing:.03em">· probable</span>` : '';
        const tabsPreHTML = hayFormaciones ? `
          <div class="po-tabs" style="margin-bottom:10px">
            <button class="po-tab activa" onclick="switchTab('pre-formaciones')">${labelFormTab}${badgeProbable}</button>
            <button class="po-tab" onclick="switchTab('pre-convocados')">Convocados</button>
          </div>
          <div id="tab-pre-convocados" style="display:none">
            ${estadioInfo}
            <div class="pre-partido">
              <div class="convocados-col">
                <div class="convocados-titulo">${p.local}</div>
                ${convHTML(jugL, true)}
              </div>
              <div class="convocados-col">
                <div class="convocados-titulo" style="text-align:right">${p.visita}</div>
                ${convHTML(jugV, false)}
              </div>
            </div>
          </div>
          <div id="tab-pre-formaciones">
            ${esProable ? `<div style="text-align:center;font-size:.65rem;color:var(--muted);padding:6px 0;margin-bottom:8px;border-bottom:1px solid var(--borde)">⚠️ Formación probable · Se actualizará al inicio del partido</div>` : ''}
            ${lineups[0]?.startXI?.length >= 2 ? canchaHTML(lineups[0], lineups[1], []) : `
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 0">
                <div style="text-align:center">
                  <div style="font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">${p.local}</div>
                  <div style="font-family:'Inter',sans-serif;font-size:2rem;color:var(--verde)">${lineups[0]?.formation || '—'}</div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">${p.visita}</div>
                  <div style="font-family:'Inter',sans-serif;font-size:2rem;color:var(--verde)">${lineups[1]?.formation || '—'}</div>
                </div>

            ${!esProable ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">

                <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Suplentes ${p.local}</div>

        <div class="po-score-wrap">
          <div class="po-score">${r.gL} - ${r.gV}</div>
        </div>
        <div class="po-equipo">
          <div class="po-flag">${flag(p.visita, 36)}</div>
          <div class="po-nombre">${p.visita}</div>
        </div>
      </div>
      <div id="po-detalles"><div class="po-sin-datos">Cargando detalles...</div></div>
    </div>`;

  if (!r.fixtureId) {
    // Intentar buscar el fixtureId — primero desde PARTIDOS hardcodeados, luego API
    const idL = TEAM_IDS[p.local]  || null;
    const idV = TEAM_IDS[p.visita] || null;
    // Buscar en fixtureCache (ya cargados antes)
    const cachedFx = Object.values(fixtureCache || {}).find(f =>
      (f.teams?.home?.id === idL && f.teams?.away?.id === idV) ||
      (f.teams?.home?.id === idV && f.teams?.away?.id === idL)
    );
    if (cachedFx) r.fixtureId = cachedFx.fixture?.id;

    if (!r.fixtureId && idL && idV) {
      try {
        // Buscar con los dos equipos para reducir resultados
        const fxData = await apiFetch(`fixtures?league=1&season=2026&team=${idL}`);
        const fxMatch = fxData.response?.find(f =>
          (f.teams?.home?.id === idL && f.teams?.away?.id === idV) ||
          (f.teams?.home?.id === idV && f.teams?.away?.id === idL)
        );
        if (fxMatch) r.fixtureId = fxMatch.fixture?.id;
      } catch(e) {}
    }
    
    if (!r.fixtureId) {
      document.getElementById('po-detalles').innerHTML = '<div class="po-sin-datos">Sin detalles disponibles</div>';
      return;
    }
  }

    function buildIconos(jugadorId, eventosLista) {
      const golesJ = eventosLista.filter(e => e.type === 'Goal' && e.player?.id === jugadorId).length;
      const amarJ  = eventosLista.filter(e => e.type === 'Card' && e.detail === 'Yellow Card' && e.player?.id === jugadorId).length;
      const rojaJ  = eventosLista.filter(e => e.type === 'Card' && (e.detail === 'Red Card' || e.detail === 'Yellow Red Card') && e.player?.id === jugadorId).length;
      let icons = '';
      if (golesJ > 0) icons += '⚽'.repeat(golesJ);
      if (amarJ > 0)  icons += '🟨';
      if (rojaJ > 0)  icons += '🟥';
      return icons;
    }

    function canchaEquipoSVG(lineup, eventosLista, esLocal, W, H) {
      const titulares = lineup.startXI || [];
      const colores = lineup.team?.colors?.player;
      const color    = colores?.primary ? `#${colores.primary}` : (esLocal ? '#2A398D' : '#8B0000');
      const numColor = colores?.number  ? `#${colores.number}`  : '#ffffff';
      const stroke   = esLocal ? '#3CAC3B' : '#E61D25';

      const filas = {};
      // Agrupar por grid si existe, sino por posición (fallback)
      const posOrder = { 'G':1, 'D':2, 'M':3, 'F':4 };
      const posGroups = {};
      titulares.forEach(j => {
        const grid = j.player?.grid;
        if (grid) {
          const [fila, col] = grid.split(':').map(Number);
          if (!filas[fila]) filas[fila] = [];
          filas[fila].push({ ...j, fila, col });
        } else {
          // Fallback: agrupar por posición
          const pos = j.player?.pos || 'M';
          const fila = posOrder[pos] || 3;
          if (!posGroups[fila]) posGroups[fila] = [];
          posGroups[fila].push(j);
        }
      });
      // Si no había grids, usar posGroups
      if (Object.keys(filas).length === 0) {
        Object.entries(posGroups).forEach(([fila, jugadores]) => {
          filas[fila] = jugadores.map((j, idx) => ({ ...j, fila: parseInt(fila), col: idx+1 }));
        });
      }

      const maxFila  = Math.max(...Object.keys(filas).map(Number));
      const radio    = 13;
      const textoH   = 20;
      const margenX  = 8;
      const anchoUtil = W - margenX * 2;

      // Rangos verticales — portero bien alejado del borde
      // topMax reducido para que delanteros locales no se pisen con linea media
      const topMin = radio + 14;
      const topMax = H / 2 - radio - 28;
      const botMin = H / 2 + radio + 28;
      const botMax = H - radio - textoH - 4;

      return Object.entries(filas).flatMap(([fila, jugadores]) => {
        jugadores.sort((a, b) => a.col - b.col);
        const n = jugadores.length;
        return jugadores.map((j, idx) => {
          const cx      = margenX + (idx + 1) / (n + 1) * anchoUtil;
          const cxFinal = esLocal ? W - cx : cx;
          const t       = maxFila <= 1 ? 0 : (parseInt(fila) - 1) / (maxFila - 1);
          const cy      = esLocal
            ? topMin + t * (topMax - topMin)
            : botMax - t * (botMax - botMin);

          const num      = j.player?.number || '';
          const apellido = (j.player?.name || '').split(' ').pop();
          const icons    = buildIconos(j.player?.id, eventosLista);

          return `<g style="cursor:pointer" onclick="abrirFichaCancha(${j.player?.id},'${(j.player?.name||'').replace(/'/g,"\\'")}','${j.player?.photo||''}',0,'Unknown')">
            <circle cx="${cxFinal.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radio}" fill="${color}" stroke="${stroke}" stroke-width="2"/>
            <text x="${cxFinal.toFixed(1)}" y="${(cy+1).toFixed(1)}" text-anchor="middle" dominant-baseline="middle"
              font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="${numColor}">${num}</text>
            <text x="${cxFinal.toFixed(1)}" y="${(cy+radio+9).toFixed(1)}" text-anchor="middle"
              font-family="Inter,sans-serif" font-size="6.5" fill="rgba(255,255,255,.9)">${apellido}</text>
            ${icons ? `<text x="${(cxFinal+radio).toFixed(1)}" y="${(cy-radio+4).toFixed(1)}" font-size="9" text-anchor="middle">${icons}</text>` : ''}
          </g>`;
        });
      }).join('');
    }

    function canchaHTML(lineupLocal, lineupVisita, eventosLista) {
      const W = 300, H = 560;  // aumentado de 500 a 560 para que entre el arquero visitante
      const equipoL = mapTeam(lineupLocal?.team?.name || '');
      const equipoV = mapTeam(lineupVisita?.team?.name || '');
      const formL = lineupLocal?.formation || '';
      const formV = lineupVisita?.formation || '';

      const jugadoresL = canchaEquipoSVG(lineupLocal, eventosLista, true, W, H);
      const jugadoresV = canchaEquipoSVG(lineupVisita, eventosLista, false, W, H);

      const svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:380px;display:block;margin:0 auto;border-radius:10px">
        <rect width="${W}" height="${H}" fill="#2d7a3a" rx="10"/>
        <!-- Líneas cancha -->
        <rect x="15" y="10" width="${W-30}" height="${H-20}" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5" rx="3"/>
        <line x1="15" y1="${H/2}" x2="${W-15}" y2="${H/2}" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <circle cx="${W/2}" cy="${H/2}" r="35" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <circle cx="${W/2}" cy="${H/2}" r="2" fill="rgba(255,255,255,.5)"/>
        <!-- Área arriba -->
        <rect x="${W/2-55}" y="10" width="110" height="55" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <rect x="${W/2-28}" y="10" width="56" height="22" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <!-- Área abajo -->
        <rect x="${W/2-55}" y="${H-65}" width="110" height="55" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <rect x="${W/2-28}" y="${H-32}" width="56" height="22" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
        <!-- Labels equipos a la izquierda -->
        <text x="18" y="${H/2-6}" text-anchor="start"
          font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,.5)" font-weight="700">${equipoL} ${formL}</text>
        <text x="18" y="${H/2+14}" text-anchor="start"
          font-family="Inter,sans-serif" font-size="8" fill="rgba(255,255,255,.5)" font-weight="700">${equipoV} ${formV}</text>
        <!-- Jugadores -->
        ${jugadoresL}
        ${jugadoresV}
      </svg>`;

      return svg;
    }


  try {
    // Fase 1: eventos + info + stats (rápido) — mostrar resumen enseguida
    // Fase 2: lineups (puede tardar) — agregar tab cuando llega
    const [resEv, resFx, resSt] = await Promise.allSettled([
      apiFetch(`fixtures/events?fixture=${r.fixtureId}`),
      apiFetch(`fixtures?id=${r.fixtureId}`),
      apiFetch(`fixtures/statistics?fixture=${r.fixtureId}`)
    ]);
    const evData      = resEv.status === 'fulfilled' ? resEv.value : {response:[]};
    const fixtureData = resFx.status === 'fulfilled' ? resFx.value : {response:[]};
    const statsData   = resSt.status === 'fulfilled' ? resSt.value : {response:[]};
    // Lineups en paralelo pero sin bloquear el render
    const lineupPromise = apiFetch(`fixtures/lineups?fixture=${r.fixtureId}`);
    const lineupData = { response: [] }; // placeholder

    const eventos = evData.response || [];
    const lineups = lineupData.response || [];
    const fixtureInfo = fixtureData.response?.[0];
    const statsResp = statsData.response || [];
    const arbitro = fixtureInfo?.fixture?.referee || null;
    const venue = fixtureInfo?.fixture?.venue;
    const estadioStr = venue?.name ? `🏟 ${venue.name}${venue.city ? ', '+venue.city : ''}` : null;
    const goles     = eventos.filter(e => e.type === 'Goal');
    const amarillas = eventos.filter(e => e.type === 'Card' && e.detail === 'Yellow Card');
    const rojas     = eventos.filter(e => e.type === 'Card' && (e.detail === 'Red Card' || e.detail === 'Yellow Red Card'));
    const cambios   = eventos.filter(e => e.type === 'subst');

    // Suplentes con flechitas de quién entró/salió
    function suplentesHTML(lineup, esLocal) {
      const suplentes = lineup?.substitutes || [];
      const entradas = cambios.filter(e => mapTeam(e.team?.name||'') === mapTeam(lineup?.team?.name||''));
      return suplentes.map(j => {
        const entro   = entradas.find(e => e.assist?.id === j.player?.id);
        const salio   = entradas.find(e => e.player?.id === j.player?.id);
        const badge   = entro ? '<span style="color:#3CAC3B;font-weight:700">▲</span> ' :
                        salio ? '<span style="color:#E61D25;font-weight:700">▼</span> ' : '';
        const min     = entro ? `<span style="color:var(--muted);font-size:.62rem"> ${entro.time?.elapsed}'</span>` :
                        salio ? `<span style="color:var(--muted);font-size:.62rem"> ${salio.time?.elapsed}'</span>` : '';
        const bg      = entro ? 'rgba(60,172,59,.15)' : salio ? 'rgba(230,29,37,.1)' : esLocal ? 'rgba(42,57,141,.2)' : 'rgba(139,0,0,.2)';
        const content = esLocal
          ? `${badge}${j.player?.number} ${j.player?.name}${min}`
          : `${min}${j.player?.name} ${j.player?.number} ${badge}`;
        return `<div onclick="abrirFichaCancha(${j.player?.id},'${(j.player?.name||'').replace(/'/g,"\\'")}','${j.player?.photo||''}',${j.player?.age||0},'${j.player?.pos||'Unknown'}')" style="font-size:.7rem;color:#fff;padding:3px 6px;border-radius:5px;background:${bg};margin-bottom:2px;${esLocal?'':'text-align:right'};cursor:pointer">${content}</div>`;
      }).join('');
    }

    // Tab Resumen
    // Colores reales de los equipos para barras
    const colorLocal  = lineups[0]?.team?.colors?.player?.primary ? `#${lineups[0].team.colors.player.primary}` : '#3CAC3B';
    const colorVisita = lineups[1]?.team?.colors?.player?.primary ? `#${lineups[1].team.colors.player.primary}` : '#E61D25';

    const htmlResumen = `
      ${renderEventos('⚽ Goles', goles)}
      ${renderEventos('🟨 Amarillas', amarillas)}
      ${renderEventos('🟥 Rojas', rojas)}
      ${renderEventos('🔄 Cambios', cambios)}
      ${lineups.length >= 2 ? `
        <div class="po-seccion-titulo" style="margin-top:10px">👕 Formaciones</div>
        ${canchaHTML(lineups[0], lineups[1], eventos)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Suplentes ${p.local}</div>
            ${suplentesHTML(lineups[0], true)}
          </div>
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;text-align:right">Suplentes ${p.visita}</div>
            ${suplentesHTML(lineups[1], false)}
          </div>
        </div>` : ''}
      ${estadioStr || arbitro ? `<div style="font-size:.7rem;color:var(--muted);text-align:center;padding:6px 0;border-top:1px solid var(--borde);margin-top:8px">
        ${estadioStr ? `${estadioStr}<br>` : ''}
        ${arbitro ? `🟡 Árbitro: ${arbitro}` : ''}
      </div>` : ''}
      ${!goles.length && !amarillas.length && !rojas.length && !cambios.length ? '<div class="po-sin-datos">Sin eventos registrados</div>' : ''}
    `;

    // Tab Estadísticas con colores reales
    function statRow(label, vL, vV) {
      const nL = parseFloat(vL) || 0;
      const nV = parseFloat(vV) || 0;
      const total = nL + nV || 1;
      const pctL = Math.round(nL / total * 100);
      const pctV = 100 - pctL;
      return `
        <div class="stat-local">${vL}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-visita">${vV}</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar-l" style="width:${pctL}%;background:${colorLocal}"></div>
          <div class="stat-bar-v" style="width:${pctV}%;background:${colorVisita}"></div>
        </div>`;
    }

    let htmlStats = '<div class="po-sin-datos">Sin estadísticas</div>';
    if (statsResp.length >= 2) {
      const sL = Object.fromEntries((statsResp[0]?.statistics||[]).map(s=>[s.type,s.value]));
      const sV = Object.fromEntries((statsResp[1]?.statistics||[]).map(s=>[s.type,s.value]));
      htmlStats = `
        <div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:12px">
          <span style="width:12px;height:12px;border-radius:50%;background:${colorLocal};display:inline-block"></span>
          <span style="font-size:.75rem;font-weight:700;color:#fff">${p.local}</span>
          <span style="font-size:.7rem;color:var(--muted)">vs</span>
          <span style="font-size:.75rem;font-weight:700;color:#fff">${p.visita}</span>
          <span style="width:12px;height:12px;border-radius:50%;background:${colorVisita};display:inline-block"></span>
        </div>
        <div class="stats-grid">
          ${statRow('Posesión', sL['Ball Possession']||'0%', sV['Ball Possession']||'0%')}
          ${statRow('Tiros totales', sL['Total Shots']??0, sV['Total Shots']??0)}
          ${statRow('Al arco', sL['Shots on Goal']??0, sV['Shots on Goal']??0)}
          ${statRow('Córners', sL['Corner Kicks']??0, sV['Corner Kicks']??0)}
          ${statRow('Faltas', sL['Fouls']??0, sV['Fouls']??0)}
          ${statRow('Fuera de juego', sL['Offsides']??0, sV['Offsides']??0)}
          ${statRow('Pases', sL['Total passes']??0, sV['Total passes']??0)}
          ${statRow('Precisión pases', sL['Passes accurate']??0, sV['Passes accurate']??0)}
          ${statRow('Atajadas', sL['Goalkeeper Saves']??0, sV['Goalkeeper Saves']??0)}
        </div>`;
    }

    // Armar tabs — Resumen, Formaciones y Estadísticas
    const tabsHTML = `
      <div class="po-tabs">
        <button class="po-tab activa" onclick="switchTab('resumen')">Resumen</button>
        ${lineups.length >= 2 ? `<button class="po-tab" onclick="switchTab('formaciones')">Formaciones</button>` : ''}
        <button class="po-tab" onclick="switchTab('estadisticas')">Estadísticas</button>
      </div>
      <div id="tab-resumen">${htmlResumen}</div>
      ${lineups.length >= 2 ? `<div id="tab-formaciones" style="display:none">
        ${canchaHTML(lineups[0], lineups[1], eventos)}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Suplentes ${p.local}</div>
            ${suplentesHTML(lineups[0], true)}
          </div>
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;text-align:right">Suplentes ${p.visita}</div>
            ${suplentesHTML(lineups[1], false)}
          </div>
        </div>
      </div>` : ''}
      <div id="tab-estadisticas" style="display:none">${htmlStats}</div>
    `;

    document.getElementById('po-detalles').innerHTML = tabsHTML;

    // Fase 2: cuando llegan los lineups, agregar el tab Formaciones sin re-renderizar todo
    lineupPromise.then(lineupData2 => {
      const lineups2 = lineupData2?.response || [];
      if (lineups2.length < 2) return; // sin datos, no hacer nada
      if (partidoAbierto !== id) return; // usuario ya cerró el overlay
      // Insertar botón Formaciones en el po-tabs si no existe
      const tabsEl = document.querySelector('#partido-overlay .po-tabs');
      if (!tabsEl || tabsEl.querySelector('[onclick*="formaciones"]')) return;
      const btnEst = tabsEl.querySelector('[onclick*="estadisticas"]');
      const btnForm = document.createElement('button');
      btnForm.className = 'po-tab';
      btnForm.setAttribute('onclick', "switchTab('formaciones')");
      btnForm.textContent = 'Formaciones';
      if (btnEst) tabsEl.insertBefore(btnForm, btnEst);
      else tabsEl.appendChild(btnForm);
      // Insertar el contenido de formaciones
      const detallesEl = document.getElementById('po-detalles');
      if (!detallesEl) return;
      const divForm = document.createElement('div');
      divForm.id = 'tab-formaciones';
      divForm.style.display = 'none';
      const colorL2 = lineups2[0]?.team?.colors?.player?.primary ? `#${lineups2[0].team.colors.player.primary}` : '#3CAC3B';
      const colorV2 = lineups2[1]?.team?.colors?.player?.primary ? `#${lineups2[1].team.colors.player.primary}` : '#E61D25';
      divForm.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:.75rem;font-weight:700;color:#fff">${p.local} <span style="color:var(--verde)">${lineups2[0]?.formation||''}</span></span>
          <span style="font-size:.75rem;font-weight:700;color:#fff"><span style="color:var(--verde)">${lineups2[1]?.formation||''}</span> ${p.visita}</span>
        </div>
        ${lineups2[0]?.startXI?.length >= 2 ? canchaHTML(lineups2[0], lineups2[1], eventos) : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Suplentes ${p.local}</div>
            ${suplentesHTML(lineups2[0], true)}
          </div>
          <div>
            <div style="font-size:.62rem;font-weight:700;color:var(--muted);margin-bottom:4px;text-transform:uppercase;text-align:right">Suplentes ${p.visita}</div>
            ${suplentesHTML(lineups2[1], false)}
          </div>
        </div>`;
      detallesEl.appendChild(divForm);
    }).catch(() => {});

    function eventoItem(ev) {
      const equipoNombre = mapTeam(ev.team?.name || '');
      const esLocal = equipoNombre === p.local;
      const icon = ev.type === 'Goal' ? '⚽' : ev.detail === 'Yellow Card' ? '🟨' : ev.detail === 'Red Card' ? '🟥' : '';
      const nombre = ev.type === 'subst'
        ? `▲ ${ev.assist?.name?.split(' ').pop()||''} / ▼ ${ev.player?.name?.split(' ').pop()||''}`
        : (ev.player?.name?.split(' ').pop() || '');
      const asist = ev.type === 'Goal' && ev.assist?.name
        ? ` (${ev.assist.name.split(' ').pop()})` : '';
      return { esLocal, icon, nombre: nombre + asist, min: ev.time?.elapsed };
    }

    function renderEventos(titulo, lista) {
      if (!lista.length) return '';
      const items = lista.map(eventoItem);
      const locales  = items.filter(i => i.esLocal);
      const visitas  = items.filter(i => !i.esLocal);
      const maxRows  = Math.max(locales.length, visitas.length);
      let rows = '';
      for (let i = 0; i < maxRows; i++) {
        const l = locales[i];
        const v = visitas[i];
        rows += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:3px">
          <div class="po-evento-local">${l ? `${l.icon ? `<span class="ev-icon-s">${l.icon}</span>` : ''}<span class="ev-nombre-s">${l.nombre}</span><span class="ev-min-s">${l.min}'</span>` : ''}</div>
          <div class="po-evento-visita">${v ? `<span class="ev-min-s">${v.min}'</span><span class="ev-nombre-s">${v.nombre}</span>${v.icon ? `<span class="ev-icon-s">${v.icon}</span>` : ''}` : ''}</div>
        </div>`;
      }
      return `<div class="po-seccion">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px">
          <div class="ev-col-header">${p.local}</div>
          <div class="ev-col-header" style="text-align:right">${p.visita}</div>
        </div>
        <div class="po-seccion-titulo">${titulo}</div>
        ${rows}
      </div>`;
    }

  } catch(e) {
    document.getElementById('po-detalles').innerHTML = '<div class="po-sin-datos">Error cargando detalles</div>';
  }
}

function switchTab(tab) {
  // Tabs del partido jugado
  ['resumen','formaciones','estadisticas'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    const btn = document.querySelector(`.po-tab[onclick="switchTab('${t}')"]`);
    if (el) el.style.display = t === tab ? 'block' : 'none';
    if (btn) btn.classList.toggle('activa', t === tab);
  });
  // Tabs del pre-partido
  ['pre-convocados','pre-formaciones'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    const btn = document.querySelector(`.po-tab[onclick="switchTab('${t}')"]`);
    if (el) el.style.display = t === tab ? 'block' : 'none';
    if (btn) btn.classList.toggle('activa', t === tab);
  });
}

function cerrarPartido() {
  partidoAbierto = null;
  document.getElementById('partido-overlay').style.display = 'none';
}

// Refresca solo el marcador y los eventos del overlay cuando hay partido en vivo
async function refrescarOverlayVivo() {
  const id = partidoAbierto;
  if (id === null) return;
  const r = RESULTADOS[id];
  if (!r || !r.fixtureId) return;
  try {
    const [evData, fixtureData] = await Promise.all([
      apiFetch(`fixtures/events?fixture=${r.fixtureId}`),
      apiFetch(`fixtures?id=${r.fixtureId}`)
    ]);
    if (partidoAbierto !== id) return; // usuario cerró el overlay
    const eventos = evData.response || [];
    const fi = fixtureData.response?.[0];
    // Actualizar marcador en el overlay sin re-renderizar todo
    const scoreEl = document.querySelector('#partido-overlay .po-score');
    if (scoreEl) scoreEl.textContent = `${r.gL} - ${r.gV}`;
    const badgeEl = document.querySelector('#partido-overlay .po-live');
    if (badgeEl && r.min) badgeEl.textContent = `EN VIVO ${r.min}'`;
    // Re-renderizar solo los eventos si el contenedor existe
    const evEl = document.getElementById('po-tab-resumen');
    if (evEl && eventos.length) {
      evEl.innerHTML = buildEventosHTML(eventos, id);
    }
  } catch(e) {}
}

// Ficha desde la cancha
function abrirFichaCancha(id, nombre, foto, edad, posicion) {
  abrirFicha(id, nombre, foto, edad, posicion);
}

async function abrirFicha(id, nombre, foto, edad, posicion) {
  const overlay = document.getElementById('ficha-overlay');
  const card    = document.getElementById('ficha-card');
  overlay.style.display = 'flex';

  const posCorta = posicion === 'Goalkeeper' ? 'Portero' :
                   posicion === 'Defender'   ? 'Defensor' :
                   posicion === 'Midfielder' ? 'Mediocampista' : 'Delantero';

  card.innerHTML = `
    <button class="ficha-close" onclick="cerrarFicha()">✕</button>
    <div class="ficha-header">
      <img class="ficha-foto" src="${foto}" alt="${nombre}">
      <div>
        <div class="ficha-nombre">${nombre}</div>
        <div class="ficha-sub">${posCorta} · ${edad} años</div>
      </div>
    </div>
    <div id="ficha-stats"><div class="po-sin-datos">Cargando stats...</div></div>`;

  try {
    const data = await apiFetch(`players?id=${id}&season=2024`);
    const stats = data.response?.[0]?.statistics?.[0];
    if (!stats) {
      document.getElementById('ficha-stats').innerHTML = '<div class="po-sin-datos">Sin estadísticas</div>';
      return;
    }
    const club = stats.team?.name || '—';
    const liga = stats.league?.name || '—';
    const clubLogo = stats.team?.logo || '';
    const goles = stats.goals?.total || 0;
    const asist = stats.goals?.assists || 0;
    const pj    = stats.games?.appearences || 0;
    const min   = stats.games?.minutes || 0;

    // Actualizar subtítulo con el club
    document.querySelector('.ficha-sub').innerHTML = `${posCorta} · ${edad} años`;

    document.getElementById('ficha-stats').innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;background:var(--mid);padding:8px 10px;border-radius:8px">
        ${clubLogo ? `<img src="${clubLogo}" style="width:22px;height:22px;object-fit:contain">` : ''}
        <span style="font-size:.78rem;color:#fff;font-weight:600">${club}</span>
        <span style="font-size:.7rem;color:var(--muted)">· ${liga}</span>
      </div>
      <div class="ficha-stats">
        <div class="ficha-stat">
          <div class="ficha-stat-val">${pj}</div>
          <div class="ficha-stat-label">Partidos</div>
        </div>
        <div class="ficha-stat">
          <div class="ficha-stat-val">${goles}</div>
          <div class="ficha-stat-label">Goles</div>
        </div>
        <div class="ficha-stat">
          <div class="ficha-stat-val">${asist}</div>
          <div class="ficha-stat-label">Asistencias</div>
        </div>
        <div class="ficha-stat">
          <div class="ficha-stat-val">${min}</div>
          <div class="ficha-stat-label">Minutos</div>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('ficha-stats').innerHTML = '<div class="po-sin-datos">Error cargando stats</div>';
  }
}

function cerrarFicha(e) {
  if (!e || e.target === document.getElementById('ficha-overlay')) {
    document.getElementById('ficha-overlay').style.display = 'none';
  }
}

// MOTOR DE POSICIONES — calcula desde RESULTADOS
// ═══════════════════════════════════════════════
function calcularPosiciones() {
  const tabla = {};
  // Inicializar todos los equipos
  for (const [g, equipos] of Object.entries(GRUPOS_DEF)) {
    tabla[g] = {};
    for (const eq of equipos) {
      tabla[g][eq] = { PJ:0, PG:0, PE:0, PP:0, GF:0, GC:0, DG:0, PTS:0 };
    }
  }
  // Procesar resultados finalizados
  for (const p of PARTIDOS) {
    if (!p.grupo) continue;
    const r = RESULTADOS[p.id];
    if (!r || r.estado !== 'ft') continue;
    const tL = tabla[p.grupo]?.[p.local];
    const tV = tabla[p.grupo]?.[p.visita];
    if (!tL || !tV) continue;
    tL.PJ++; tV.PJ++;
    tL.GF += r.gL; tL.GC += r.gV;
    tV.GF += r.gV; tV.GC += r.gL;
    tL.DG = tL.GF - tL.GC;
    tV.DG = tV.GF - tV.GC;
    if (r.gL > r.gV)      { tL.PG++; tL.PTS+=3; tV.PP++; }
    else if (r.gL < r.gV) { tV.PG++; tV.PTS+=3; tL.PP++; }
    else                   { tL.PE++; tL.PTS++; tV.PE++; tV.PTS++; }
  }
  // Ordenar: PTS > DG > GF
  const ordenada = {};
  for (const [g, equipos] of Object.entries(tabla)) {
    ordenada[g] = Object.entries(equipos)
      .sort((a,b) => b[1].PTS-a[1].PTS || b[1].DG-a[1].DG || b[1].GF-a[1].GF)
      .map(([nombre, stats]) => ({ nombre, ...stats }));
  }
  return ordenada;
}

async function cargarCompActual() {
  document.getElementById('comp-fixture-wrap').innerHTML = '<div class="po-sin-datos">Cargando...</div>';
  document.getElementById('comp-posiciones-wrap').innerHTML = '<div class="po-sin-datos">Cargando...</div>';
  try {
    const [fixtData, standData] = await Promise.all([
      apiFetch(`fixtures?league=${compActual.league}&season=${compActual.season}`),
      apiFetch(`standings?league=${compActual.league}&season=${compActual.season}`)
    ]);

    // FIXTURE
    let fixtures = fixtData.response || [];
    // Filtrar qualifying rounds para Champions y Libertadores
    const leaguesConQualifying = ['2','13','11'];
    if (leaguesConQualifying.includes(compActual.league)) {
      const qualifyingKeywords = ['qualifying','prelim','1st qualifying','2nd qualifying','3rd qualifying','play-off'];
      const filtrados = fixtures.filter(f => {
        const round = (f.league.round || '').toLowerCase();
        return !qualifyingKeywords.some(kw => round.includes(kw));
      });
      if (filtrados.length > 0) fixtures = filtrados;
    }
    // Liga Profesional ARG: múltiples torneos en el mismo season
    // 2025: "1st Phase" / "2nd Phase" + playoffs sin prefijo
    // 2026: "Apertura - X" / "Clausura - X"
    if (compActual.league === '128') {
      const tieneClausura = fixtures.some(f => (f.league.round || '').startsWith('Clausura'));
      const tieneApertura = fixtures.some(f => (f.league.round || '').startsWith('Apertura'));
      const tieneSegundaFase = fixtures.some(f => (f.league.round || '').startsWith('2nd Phase'));
      if (tieneClausura) {
        // Hay Clausura: mostrar solo Clausura (partidos jugados o próximos)
        const filtrados = fixtures.filter(f => (f.league.round || '').startsWith('Clausura'));
        if (filtrados.length > 0) fixtures = filtrados;
      } else if (tieneApertura) {
        // Solo hay Apertura: mostrar todo el Apertura
        const filtrados = fixtures.filter(f => (f.league.round || '').startsWith('Apertura'));
        if (filtrados.length > 0) fixtures = filtrados;
      } else if (tieneSegundaFase) {
        // Formato 2025: mostrar 2nd Phase + playoffs finales
        const filtrados = fixtures.filter(f => {
          const r = f.league.round || '';
          return r.startsWith('2nd Phase') || ['Round of 16','Quarter-finals','Semi-finals','Final'].includes(r);
        });
        if (filtrados.length > 0) fixtures = filtrados;
      }
    }
    // Primera Nacional ARG: solo fixtures de league.id === 130
    if (compActual.league === '129') {
      const filtrados = fixtures.filter(f => f.league.id === 129);
      if (filtrados.length > 0) fixtures = filtrados;
    }
    // Copa Argentina: solo fixtures de league.id === 130
    if (compActual.league === '130') {
      const filtrados = fixtures.filter(f => f.league.id === 130);
      if (filtrados.length > 0) fixtures = filtrados;
    }
    // Primera B Metropolitana: solo fixtures de league.id === 131
    if (compActual.league === '131') {
      const filtrados = fixtures.filter(f => f.league.id === 131);
      if (filtrados.length > 0) fixtures = filtrados;
    }
    if (fixtures.length === 0) {
      document.getElementById('comp-fixture-wrap').innerHTML = '<div class="po-sin-datos">Sin partidos disponibles</div>';
    } else {
      // Orden de rondas
      const ordenRondas = [
        'group stage','grupo','groups',
        'round of 32','32vos','round of 16','octavos','16th finals',
        'quarter-finals','cuartos','quarter finals',
        'semi-finals','semis','semi finals',
        '3rd place final','tercer puesto',
        'final'
      ];
      const rankRonda = r => {
        const rl = (r||'').toLowerCase();
        for (let i = 0; i < ordenRondas.length; i++) {
          if (rl.includes(ordenRondas[i])) return i;
        }
        return 99;
      };

      // Agrupar por ronda
      const porRonda = {};
      fixtures.forEach(f => {
        const r = f.league.round || 'Sin ronda';
        if (!porRonda[r]) porRonda[r] = [];
        porRonda[r].push(f);
      });

      // Ordenar rondas
      const rondas = Object.keys(porRonda).sort((a,b) => rankRonda(b) - rankRonda(a));

      const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      let html = '';

      rondas.forEach(ronda => {
        const ahora = Date.now();
        const partidos = porRonda[ronda].sort((a,b) => {
          const ta = new Date(a.fixture.date).getTime();
          const tb = new Date(b.fixture.date).getTime();
          const stA = a.fixture.status.short;
          const stB = b.fixture.status.short;
          const esNSa = stA === 'NS';
          const esNSb = stB === 'NS';
          // NS primero (próximos), luego jugados más recientes
          if (esNSa && !esNSb) return -1;
          if (!esNSa && esNSb) return 1;
          if (esNSa && esNSb) return ta - tb; // próximos: más cercano primero
          return tb - ta; // jugados: más reciente primero
        });
        const rows = partidos.map(f => {
          const horaARG = new Date(new Date(f.fixture.date).getTime() - 3*60*60*1000);
          const hh = horaARG.getUTCHours().toString().padStart(2,'0');
          const mm = horaARG.getUTCMinutes().toString().padStart(2,'0');
          const dd = horaARG.getUTCDate();
          const mes = meses[horaARG.getUTCMonth()];
          const st = f.fixture.status.short;
          const terminado = ['FT','AET','PEN'].includes(st);
          const enVivo = ['1H','HT','2H','ET'].includes(st);
          const local = f.teams.home.name;
          const visita = f.teams.away.name;
          const gL = f.goals.home ?? '';
          const gV = f.goals.away ?? '';
          const horaStr = terminado
            ? `<span style="font-family:'Inter',sans-serif;font-size:1.1rem;color:#fff">${gL}-${gV}</span>`
            : enVivo
            ? `<span style="font-family:'Inter',sans-serif;font-size:1rem;color:var(--rojo)">${gL}-${gV}</span>`
            : `<span style="font-family:'Inter',sans-serif;font-size:1rem;color:var(--verde)">${hh}:${mm}</span>`;
          return `<div class="partido" style="cursor:default">
            <div style="width:50px;flex-shrink:0;text-align:center;">
              ${horaStr}
              <div style="font-size:.6rem;color:var(--muted);margin-top:2px;">${dd} ${mes}</div>
            </div>
            <div class="partido-info">
              <div class="equipos">
                <span class="equipo-nombre local">

let jugadorTimer = null;
async function buscarJugador(query) {
  clearTimeout(jugadorTimer);
  if (query.length < 3) {
    document.getElementById('jugadores-resultado').innerHTML = '<div class="po-sin-datos" style="margin-top:40px;">Escribí al menos 3 letras</div>';
    return;
  }
  jugadorTimer = setTimeout(async () => {
    document.getElementById('jugadores-resultado').innerHTML = '<div class="po-sin-datos">Buscando...</div>';
    try {
      // Buscar en temporada 2024 (más datos disponibles)
      const [data1, data2] = await Promise.all([
        apiFetch(`players?search=${encodeURIComponent(query)}&league=128&season=2025`),
        apiFetch(`players?search=${encodeURIComponent(query)}&league=1&season=2026`)
      ]);
      // Combinar resultados y deduplicar por ID
      const todos = [...(data1.response||[]), ...(data2.response||[])];
      const vistos = new Set();
      const jugadores = todos.filter(j => {
        if (vistos.has(j.player.id)) return false;
        vistos.add(j.player.id);
        return true;
      });
      if (jugadores.length === 0) {
        // Intentar búsqueda más amplia
        const data3 = await apiFetch(`players?search=${encodeURIComponent(query)}&league=39&season=2024`);
        const extra = data3.response || [];
        if (extra.length === 0) {
          document.getElementById('jugadores-resultado').innerHTML = '<div class="po-sin-datos">Sin resultados — probá con otro nombre</div>';
          return;
        }
        jugadores.push(...extra);
      }
      const html = jugadores.map(j => {
        const p = j.player;
        const s = j.statistics?.[0];
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--borde);cursor:pointer;"
          onclick="abrirFicha(${p.id},'${p.name.replace(/'/g,"&#39;")}','${p.photo}',${p.age||0},'${s?.games?.position||''}')">
          <img src="${p.photo}" width="40" height="40" style="border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><rect width=%2240%22 height=%2240%22 fill=%22%231c1c38%22/></svg>'">
          <div style="flex:1;min-width:0;">
            <div style="font-size:.88rem;font-weight:600;color:#fff;">${p.name}</div>
            <div style="font-size:.72rem;color:var(--muted);">${s?.team?.name||''} · ${s?.games?.position||''} · ${p.nationality||''}</div>
          </div>
          <img src="${s?.team?.logo||''}" width="24" height="24" style="object-fit:contain;flex-shrink:0;" onerror="this.style.display='none'">
        </div>`;
      }).join('');
      document.getElementById('jugadores-resultado').innerHTML = html;
    } catch(e) {
      document.getElementById('jugadores-resultado').innerHTML = '<div class="po-sin-datos">Error buscando</div>';
    }
  }, 500);
}



// ═══════════════════════════════════════════════
// FIXTURE
// ═══════════════════════════════════════════════
function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

// Calcular fecha anterior dado un string "YYYY-MM-DD"
function fechaAnterior(fecha) {
  const d = new Date(fecha + 'T12:00:00');
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0,10);
}

function agrupar(lista) {
  const map = {};
  const yaEnDiaPrev = new Set(); // IDs de partidos ya agregados como madrugada

  for (const p of lista) {
    // Si es madrugada y no ocurrió, agregarlo SOLO en el día anterior
    if (p.hora.includes('*') && !RESULTADOS[p.id]?.estado) {
      const fechaPrev = fechaAnterior(p.fecha);
      const pPrev = PARTIDOS.find(x => x.fecha === fechaPrev);
      const diaPrev = pPrev?.dia || fechaPrev;
      if (!map[fechaPrev]) map[fechaPrev] = { dia: diaPrev, partidos: [] };
      if (!map[fechaPrev].partidos.find(x => x.id === p.id)) {
        map[fechaPrev].partidos.push({ ...p, esMadrugada: true });
        yaEnDiaPrev.add(p.id);
      }
      continue; // NO agregar al día real
    }

    // Partido normal o madrugada ya ocurrida — agregar al día real
    if (!map[p.fecha]) map[p.fecha] = { dia: p.dia, partidos: [] };
    map[p.fecha].partidos.push({ ...p, esMadrugada: false });
  }

  // Ordenar cada día por hora
  for (const dia of Object.values(map)) {
    dia.partidos.sort((a, b) => {
      if (a.esMadrugada && !b.esMadrugada) return 1;
      if (!a.esMadrugada && b.esMadrugada) return -1;
      const ha = parseInt(a.hora.replace('*','').replace(':',''));
      const hb = parseInt(b.hora.replace('*','').replace(':',''));
      return ha - hb;
    });
  }
  return Object.entries(map).sort((a,b) => a[0].localeCompare(b[0]));
}
function filtrar() {
  let res = PARTIDOS;
  if (faseActual !== 'todos') res = res.filter(p => p.fase === faseActual);
  if (fechaActiva) {
    res = res.filter(p => {
      if (p.fecha === fechaActiva) return true;
      // Incluir madrugada del día siguiente si no ocurrió
      const d = new Date(fechaActiva + 'T12:00:00');
      d.setDate(d.getDate() + 1);
      const fechaSig = d.toISOString().slice(0,10);
      if (p.fecha === fechaSig && p.hora.includes('*')) {
        return !RESULTADOS[p.id]?.estado;
      }
      return false;
    });
  }
  if (busqueda) {
    const q = normalize(busqueda);
    res = res.filter(p =>
      normalize(p.local).includes(q) || normalize(p.visita).includes(q) ||
      normalize(p.sede).includes(q)  || normalize(p.dia).includes(q)
    );
  }
  return res;
}

function resultadoBadge(p) {
  const r = RESULTADOS[p.id];
  if (!r) return '';
  if (r.estado === 'live') {
    return `<div class="resultado-badge en-vivo">
      <span class="gol-local">${r.gL}</span>
      <span class="sep-gol">-</span>
      <span class="gol-visita">${r.gV}</span>
      <span class="live-dot"></span>
    </div>`;
  }
  if (r.estado === 'ft') {
    return `<div class="resultado-badge finalizado">
      <span class="gol-local">${r.gL}</span>
      <span class="sep-gol">-</span>
      <span class="gol-visita">${r.gV}</span>
    </div>`;
  }
  return '';
}

// Hora o FIN según estado
function horaOFin(p) {
  const r = RESULTADOS[p.id];
  if (r?.estado === 'ft') return '<span class="hora-fin">FIN</span>';
  if (r?.estado === 'live') return `<span class="hora-live">${r.min ? r.min+"'" : 'EN VIVO'}</span>`;
  return `<span class="hora">${p.hora}</span>`;
}

function buildFechaChips() {
  const fechas = [...new Set(PARTIDOS.map(p => p.fecha))].sort();
  const hoy = fechaHoyARG();
  document.getElementById('fechaScroll').innerHTML = fechas.map(f => {
    const d = new Date(f+'T12:00:00');
    const dow = DIAS_ES[d.getDay()];
    const num = d.getDate();
    const mes = MESES_ES[d.getMonth()-6] || '';
    return `<div class="fecha-chip ${fechaActiva===f?'active':''} ${f===hoy?'hoy-chip':''}"
      onclick="toggleFecha('${f}')">
      <span class="chip-dow">${dow}</span>
      <span class="chip-num">${num}</span>
      <span class="chip-mes">${mes}</span>
    </div>`;
  }).join('');
}

function toggleFecha(f) {
  fechaActiva = fechaActiva===f ? null : f;
  busqueda=''; document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('visible');
  diasAbiertos={};
  buildFechaChips(); render();
}
